<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — FlickerPlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #f97316;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #f97316;
    }
    p {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #f97316;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #ea6c0a; }
    .logo {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      font-weight: 800;
      color: #f97316;
      letter-spacing: -0.5px;
    }
  </style>
</head>
<body>
  <div class="logo">FlickerPlay</div>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>
    It looks like you've lost your internet connection.
    Check your connection and try again to continue streaming.
  </p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
